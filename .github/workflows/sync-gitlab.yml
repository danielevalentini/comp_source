
name: Sync to GitLab

on:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Debug secrets presence
        run: |
          if [ -z "${{ secrets.GITLAB_TOKEN }}" ]; then
            echo "TOKEN MANCANTE"
            exit 1
          else
            echo "TOKEN PRESENTE"
          fi
      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/daniele.valentini1972/comp_target.git
          git push gitlab main --tags
          
      
